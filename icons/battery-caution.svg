<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Battery body: red outline (critical state) -->
  <rect x="4.5" y="2.5" width="15" height="21" rx="1.5" ry="1.5"
        fill="none" stroke="#e53935" stroke-width="1.5"/>
  <!-- Positive terminal: red -->
  <rect x="8.5" y="0.5" width="7" height="2" rx="0.5" ry="0.5"
        fill="#e53935" stroke="none"/>
  <!-- Charge fill: red, ~10% (caution bucket 0-10%) -->
  <rect x="5.75" y="20.4" width="12.5" height="1.85" rx="0.5" ry="0.5"
        fill="#e53935" stroke="none"/>
</svg>
