<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Vertical battery body: white outline, transparent interior -->
  <rect x="4.5" y="2.5" width="15" height="21" rx="1.5" ry="1.5"
        fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <!-- Positive terminal on top: solid white -->
  <rect x="8.5" y="0.5" width="7" height="2" rx="0.5" ry="0.5"
        fill="#ffffff" stroke="none"/>
  <!-- Charge fill: Pi-OS panel blue, ~70% from bottom for battery-good bucket (51-80%) -->
  <rect x="5.75" y="9.3" width="12.5" height="12.95" rx="0.5" ry="0.5"
        fill="#0F71CB" stroke="none"/>
</svg>
